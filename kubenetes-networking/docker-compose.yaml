version: "3"
services:
  auth:
    build: ./auth-api
  users:
    build: ./users-api
    ports: 
      - "8080:8080"
    environment:
      AUTH_ADDRESS: 
      AUTH_SERVICE_SERVICE_HOST: auth  
  tasks:
    build: ./tasks-api
    ports: 
      - "80:80"
    environment:
      TASKS_FOLDER: tasks
      AUTH_ADDRESS: auth
    
